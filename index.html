function emptyGrades() {
  return { trimestral: [], diaria: [], apreciacion: [] };
}

function normalizeSubject(s) {
  if (Array.isArray(s.grades)) {
    return { ...s, grades: { trimestral: [], diaria: s.grades, apreciacion: [] } };
  }
  if (!s.grades) return { ...s, grades: emptyGrades() };
  return { ...s, grades: { trimestral: s.grades.trimestral || [], diaria: s.grades.diaria || [], apreciacion: s.grades.apreciacion || [] } };
}

function allGrades(s) {
  return [...s.grades.trimestral, ...s.grades.diaria, ...s.grades.apreciacion];
}

function average(arr) {
  if (!arr.length) return null;
  return arr.reduce((a, b) => a + b, 0) / arr.length;
}

function fmtDate(d) {
  const date = new Date(d + "T00:00:00");
  return `${date.getDate()} de ${MONTHS_ES[date.getMonth()]}`;
}

function daysUntil(d) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const target = new Date(d + "T00:00:00");
  return Math.round((target - today) / 86400000);
}

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

// ---- persistence: real localStorage, works on any host (e.g. GitHub Pages) ----
function storageGet(key) {
  try {
    return window.localStorage.getItem(key);
  } catch (e) {
    return null;
  }
}
function storageSet(key, value) {
  try {
    window.localStorage.setItem(key, value);
  } catch (e) {}
}
function storageRemove(key) {
  try {
    window.localStorage.removeItem(key);
  } catch (e) {}
}

async function biometricAvailable() {
  try {
    if (!window.PublicKeyCredential || !window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable) return false;
    return await window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
  } catch (e) {
    return false;
  }
}

async function tryBiometricPrompt(name) {
  try {
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const userId = crypto.getRandomValues(new Uint8Array(16));
    await navigator.credentials.create({
      publicKey: {
        challenge,
        rp: { name: "Agenda Escolar" },
        user: { id: userId, name: name || "yo", displayName: name || "Yo" },
        pubKeyCredParams: [{ type: "public-key", alg: -7 }, { type: "public-key", alg: -257 }],
        authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
        timeout: 60000,
      },
    });
    return true;
  } catch (e) {
    return false;
  }
}

// ---------- Login ----------
function Login({ onLogin }) {
  const [name, setName] = useState("");
  const [busy, setBusy] = useState(false);
  const [bioSupported, setBioSupported] = useState(false);
  const [bioError, setBioError] = useState("");

  useEffect(() => {
    biometricAvailable().then(setBioSupported);
  }, []);

  const submit = async () => {
    if (!name.trim() || busy) return;
    setBusy(true);
    await onLogin(name.trim(), false);
    setBusy(false);
  };

  const submitBiometric = async () => {
    if (busy) return;
    setBioError("");
    setBusy(true);
    const ok = await tryBiometricPrompt(name.trim());
    if (ok) {
      await onLogin(name.trim() || "Tú", true);
    } else {
      setBioError("No se pudo verificar tu biometría en este dispositivo. Iniciá sesión con tu nombre.");
    }
    setBusy(false);
  };

  return (
    <div className="login-bg" style={{ minHeight: "100dvh" }}>
      <div className="login-overlay" style={{ minHeight: "100dvh" }}>
        <div className="flex flex-col justify-center px-6 py-10" style={{ minHeight: "100dvh" }}>
          <div className="flex justify-center mb-5">
            <img src={LOGO_URI} alt="Agenda Escolar" style={{ width: 84, height: 84, borderRadius: 20, boxShadow: "0 10px 30px rgba(0,0,0,0.45)" }} />
          </div>
          <p style={{ fontFamily: "'JetBrains Mono', monospace", color: COLORS.ivoryMuted, letterSpacing: "0.15em" }} className="text-xs uppercase mb-2 text-center">
            Cuaderno de tareas
          </p>
          <h1 style={{ fontFamily: "'Fraunces', serif", color: COLORS.ivory }} className="text-3xl font-semibold leading-tight text-center mb-8">
            Agenda Escolar
          </h1>

          <div className="rounded-2xl p-5 sm:p-6" style={{ background: COLORS.paper, border: `1px solid ${COLORS.paperEdge}` }}>
            <label style={{ fontFamily: "'JetBrains Mono', monospace", color: COLORS.muted, letterSpacing: "0.05em" }} className="text-xs uppercase block mb-1.5">
              Tu nombre
            </label>
            <input
              value={name}
              onChange={(e) => setName(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && submit()}
              placeholder="¿Cómo te llamas?"
              autoFocus
              style={{ fontFamily: "'Inter', sans-serif", background: "#FFFFFF", border: `1px solid ${COLORS.paperEdge}`, color: COLORS.ink }}
              className="w-full rounded-lg px-4 py-3 text-sm mb-4"
            />
            <button
              onClick={submit}
              disabled={!name.trim() || busy}
              style={{ fontFamily: "'Inter', sans-serif", background: COLORS.red, color: "#FFFFFF", opacity: name.trim() ? 1 : 0.6 }}
              className="w-full rounded-full py-3 text-sm font-semibold"
            >
              {busy ? "Entrando…" : "Iniciar sesión"}
            </button>

            {bioSupported && (
              <React.Fragment>
                <div className="flex items-center gap-3 my-4">
                  <div style={{ flex: 1, height: 1, background: COLORS.paperEdge }} />
                  <span style={{ color: COLORS.muted, fontFamily: "'Inter', sans-serif" }} className="text-xs">o</span>
                  <div style={{ flex: 1, height: 1, background: COLORS.paperEdge }} />
                </div>
                <button
                  onClick={submitBiometric}
                  disabled={busy}
                  style={{ fontFamily: "'Inter', sans-serif", background: "#FFFFFF", color: COLORS.ink, border: `1.5px solid ${COLORS.cover}` }}
                  className="w-full rounded-full py-3 text-sm font-semibold flex items-center justify-center gap-2"
                >
                  <FingerprintIcon size={17} color={COLORS.cover} />
                  Usar Face ID / huella
                </button>
                {bioError && (
                  <p style={{ color: COLORS.red, fontFamily: "'Inter', sans-serif" }} className="text-xs mt-2 text-center">
                    {bioError}
                  </p>
                )}
              </React.Fragment>
            )}
          </div>

          <p style={{ color: COLORS.ivoryMuted, fontFamily: "'Inter', sans-serif" }} className="text-xs text-center mt-6 px-2">
            Tu agenda y tus notas quedan guardadas en este dispositivo para la próxima vez.
          </p>
        </div>
      </div>
    </div>
  );
}

// ---------- Calendar screen ----------
function CalendarScreen({ tasks, onBack, onDelete }) {
  const [cursor, setCursor] = useState(() => {
    const d = new Date();
    return { year: d.getFullYear(), month: d.getMonth() };
  });

  const taskDates = {};
  tasks.forEach((t) => {
    taskDates[t.dueDate] = (taskDates[t.dueDate] || 0) + 1;
  });

  const { year, month } = cursor;
  const first = new Date(year, month, 1);
  const startOffset = (first.getDay() + 6) % 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const grid = [];
  for (let i = 0; i < startOffset; i++) grid.push(null);
  for (let d = 1; d <= daysInMonth; d++) grid.push(d);

  const todayStr = new Date().toISOString().slice(0, 10);
  const upcoming = [...tasks].sort((a, b) => a.dueDate.localeCompare(b.dueDate));
  const pad = (n) => String(n).padStart(2, "0");

  return (
    <div style={{ background: COLORS.paper, minHeight: "100dvh" }}>
      <ScreenHeader title="Calendario" onBack={onBack} />

      <div className="px-4 sm:px-5" style={{ paddingBottom: "calc(env(safe-area-inset-bottom, 0px) + 24px)" }}>
        <div className="rounded-2xl p-3.5 sm:p-4 mb-6" style={{ background: "#FFFFFF", border: `1px solid ${COLORS.gridLine}` }}>
          <div className="flex items-center justify-between mb-4">
            <button
              onClick={() => setCursor((c) => (c.month === 0 ? { year: c.year - 1, month: 11 } : { year: c.year, month: c.month - 1 }))}
              className="w-8 h-8 flex items-center justify-center rounded-full"
              style={{ color: COLORS.ink }}
            >
              <ChevronLeftIcon size={18} />
            </button>
            <div style={{ fontFamily: "'Fraunces', serif", color: COLORS.ink }} className="font-semibold capitalize">
              {MONTHS_ES[cursor.month]} {cursor.year}
            </div>
            <button
              onClick={() => setCursor((c) => (c.month === 11 ? { year: c.year + 1, month: 0 } : { year: c.year, month: c.month + 1 }))}
              className="w-8 h-8 flex items-center justify-center rounded-full"
              style={{ color: COLORS.ink }}
            >
              <ChevronRightIcon size={18} />
            </button>
          </div>

          <div className="grid grid-cols-7 gap-1 mb-1">
            {DAYS_ES.map((d, i) => (
              <div key={i} style={{ color: COLORS.muted, fontFamily: "'JetBrains Mono', monospace" }} className="text-center text-xs py-1">
                {d}
              </div>
            ))}
          </div>
          <div className="grid grid-cols-7 gap-1">
            {grid.map((d, i) => {
              if (d === null) return <div key={i} />;
              const dateStr = `${year}-${pad(month + 1)}-${pad(d)}`;
              const hasTask = taskDates[dateStr];
              const isToday = dateStr === todayStr;
              return (
                <div
                  key={i}
                  className="aspect-square flex flex-col items-center justify-center rounded-lg text-sm relative"
                  style={{
                    background: hasTask ? COLORS.yellowSoft : "transparent",
                    color: isToday ? COLORS.red : COLORS.ink,
                    fontWeight: isToday ? 700 : 400,
                    fontFamily: "'Inter', sans-serif",
                    border: isToday ? `1.5px solid ${COLORS.red}` : "1px solid transparent",
                  }}
                >
                  {d}
                  {hasTask ? <span className="absolute bottom-1 w-1 h-1 rounded-full" style={{ background: COLORS.yellow }} /> : null}
                </div>
              );
            })}
          </div>
        </div>

        <p style={{ fontFamily: "'JetBrains Mono', monospace", color: COLORS.muted, letterSpacing: "0.1em" }} className="text-xs uppercase mb-3">
          Próximas entregas
        </p>

        {upcoming.length === 0 ? (
          <div className="text-center py-10" style={{ color: COLORS.muted, fontFamily: "'Inter', sans-serif" }}>
            Todavía no hay nada agendado.
          </div>
        ) : (
          <div className="flex flex-col gap-3">
            {upcoming.map((t) => {
              const dleft = daysUntil(t.dueDate);
              const overdue = dleft < 0;
              const soon = dleft >= 0 && dleft <= 2;
              return (
                <div key={t.id} className="rounded-xl p-4 relative" style={{ background: "#FFFFFF", border: `1px solid ${COLORS.gridLine}` }}>
                  <div className="flex items-start justify-between gap-3">
                    <div className="flex-1 min-w-0">
                      <div style={{ fontFamily: "'Fraunces', serif", color: COLORS.ink }} className="font-semibold truncate">
                        {t.title}
                      </div>
                      <div style={{ color: COLORS.red, fontFamily: "'Inter', sans-serif" }} className="text-xs font-medium mt-0.5">
                        {t.subject}
                      </div>
                      {t.description ? (
                        <div style={{ color: COLORS.muted, fontFamily: "'Inter', sans-serif" }} className="text-sm mt-1.5">
                          {t.description}
                        </div>
                      ) : null}
                    </div>
                    <button onClick={() => onDelete(t.id)} className="shrink-0 p-1">
                      <Trash2Icon size={16} color={COLORS.muted} />
                    </button>
                  </div>
                  <div className="flex items-center justify-between mt-3">
                    <span style={{ fontFamily: "'JetBrains Mono', monospace", color: COLORS.ink }} className="text-xs">
                      {fmtDate(t.dueDate)}
                    </span>
                    <span
                      className="text-xs font-semibold px-2 py-0.5 rounded-full"
                      style={{
                        fontFamily: "'JetBrains Mono', monospace",
                        background: overdue ? COLORS.redSoft : soon ? COLORS.yellowSoft : "#EAF0EA",
                        color: overdue ? COLORS.red : soon ? "#8A6A17" : "#3D5C46",
                      }}
                    >
                      {overdue ? `venció hace ${Math.abs(dleft)}d` : dleft === 0 ? "hoy" : `en ${dleft}d`}
                    </span>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ---------- Add screen ----------
function AddScreen({ onBack, onAdd, subjects }) {
  const [title, setTitle] = useState("");
  const [description, setDescription] = useState("");
  const [subject, setSubject] = useState("");
  const [dueDate, setDueDate] = useState("");
  const [saved, setSaved] = useState(false);

  const canSave = title.trim() && subject.trim() && dueDate;

  const submit = () => {
    if (!canSave) return;
    onAdd({ id: uid(), title: title.trim(), description: description.trim(), subject: subject.trim(), dueDate });
    setSaved(true);
    setTitle("");
    setDescription("");
    setSubject("");
    setDueDate("");
    setTimeout(() => setSaved(false), 1800);
  };

  const inputStyle = { fontFamily: "'Inter', sans-serif", background: "#FFFFFF", border: `1px solid ${COLORS.paperEdge}`, color: COLORS.ink };

  return (
    <div style={{ background: COLORS.paper, minHeight: "100dvh" }}>
      <ScreenHeader title="Agregar entrega" onBack={onBack} />
      <div className="px-4 sm:px-5 flex flex-col gap-4" style={{ paddingBottom: "calc(env(safe-area-inset-bottom, 0px) + 24px)" }}>
        <Field label="Título (tarea, trabajo o proyecto)">
          <input value={title} onChange={(e) => setTitle(e.target.value)} placeholder="Ej. Ensayo de historia" style={inputStyle} className="w-full rounded-lg px-4 py-3 text-sm" />
        </Field>

        <Field label="Descripción">
          <textarea value={description} onChange={(e) => setDescription(e.target.value)} placeholder="Detalles de lo que hay que entregar" rows={3} style={inputStyle} className="w-full rounded-lg px-4 py-3 text-sm resize-none" />
        </Field>

        <Field label="Materia">
          <input value={subject} onChange={(e) => setSubject(e.target.value)} placeholder="Ej. Matemáticas" style={inputStyle} className="w-full rounded-lg px-4 py-3 text-sm" list="subject-suggestions" />
          <datalist id="subject-suggestions">
            {subjects.map((s) => (
              <option key={s.id} value={s.name} />
            ))}
          </datalist>
        </Field>

        <Field label="Fecha de entrega">
          <input type="date" value={dueDate} onChange={(e) => setDueDate(e.target.value)} style={inputStyle} className="w-full rounded-lg px-4 py-3 text-sm" />
        </Field>

        <button
          onClick={submit}
          disabled={!canSave}
          className="mt-2 w-full rounded-full py-3.5 text-sm font-semibold flex items-center justify-center gap-2"
          style={{ fontFamily: "'Inter', sans-serif", background: canSave ? COLORS.red : COLORS.paperEdge, color: "#FFFFFF", opacity: canSave ? 1 : 0.7 }}
        >
          {saved ? (
            <React.Fragment>
              <CheckIcon size={16} /> Guardado
            </React.Fragment>
          ) : (
            "Agregar a la agenda"
          )}
        </button>
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div>
      <label style={{ fontFamily: "'JetBrains Mono', monospace", color: COLORS.muted, letterSpacing: "0.05em" }} className="text-xs uppercase block mb-1.5">
        {label}
      </label>
      {children}
    </div>
  );
}

// ---------- Grade category block (vertical list) ----------
function CategoryBlock({ subjectId, catKey, catLabel, grades, onAdd, onRemove }) {
  const [value, setValue] = useState("");
  const avg = average(grades);

  const submit = () => {
    const val = parseFloat(value);
    if (isNaN(val) || val < 0 || val > 5) return;
    onAdd(subjectId, catKey, val);
    setValue("");
  };

  return (
    <div className="mb-4 last:mb-0">
      <div className="flex items-center justify-between mb-2">
        <span style={{ fontFamily: "'JetBrains Mono', monospace", color: COLORS.ink, letterSpacing: "0.03em" }} className="text-xs font-bold uppercase">
          {catLabel}
        </span>
        <span style={{ color: COLORS.muted, fontFamily: "'Inter', sans-serif" }} className="text-xs">
          {avg !== null ? `prom. ${avg.toFixed(2)}` : "sin notas"}
        </span>
      </div>

      {grades.length > 0 && (
        <div className="flex flex-col gap-1.5 mb-2">
          {grades.map((g, idx) => (
            <div key={idx} className="flex items-center justify-between rounded-lg px-3 py-2" style={{ background: COLORS.paper, border: `1px solid ${COLORS.paperEdge}` }}>
              <span style={{ fontFamily: "'JetBrains Mono', monospace", color: COLORS.ink }} className="text-sm font-medium">
                {g.toFixed(1)}
              </span>
              <button onClick={() => onRemove(subjectId, catKey, idx)} className="p-1">
                <XIcon size={14} color={COLORS.muted} />
              </button>
            </div>
          ))}
        </div>
      )}

      <div className="flex gap-2">
        <input
          type="number"
          min="0"
          max="5"
          step="0.1"
          value={value}
          onChange={(e) => setValue(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && submit()}
          placeholder="Nota (0–5)"
          style={{ fontFamily: "'JetBrains Mono', monospace", background: "#FFFFFF", border: `1px solid ${COLORS.paperEdge}`, color: COLORS.ink }}
          className="flex-1 min-w-0 rounded-lg px-3 py-2 text-sm"
        />
        <button onClick={submit} style={{ fontFamily: "'Inter', sans-serif", background: COLORS.cover, color: COLORS.ivory }} className="rounded-lg px-3.5 py-2 text-sm font-medium shrink-0">
          Agregar
        </button>
      </div>
    </div>
  );
}

// ---------- Grades screen ----------
function GradesScreen({ subjects, onBack, onAddSubject, onAddGrade, onRemoveGrade, onDeleteSubject }) {
  const [expandedId, setExpandedId] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [newSubject, setNewSubject] = useState("");

  const confirmAddSubject = () => {
    if (!newSubject.trim()) return;
    onAddSubject(newSubject.trim());
    setNewSubject("");
    setShowAdd(false);
  };

  return (
    <div style={{ background: COLORS.paper, minHeight: "100dvh" }} className="relative">
      <ScreenHeader title="Promedios" onBack={onBack} />

      <div className="px-4 sm:px-5" style={{ paddingBottom: "calc(env(safe-area-inset-bottom, 0px) + 100px)" }}>
        {subjects.length === 0 ? (
          <div className="text-center py-10" style={{ color: COLORS.muted, fontFamily: "'Inter', sans-serif" }}>
            <BookOpenIcon size={28} color={COLORS.muted} />
            <div className="mt-2">Toca el botón + para agregar tu primera materia.</div>
          </div>
        ) : (
          <div className="flex flex-col gap-2">
            {subjects.map((s) => {
              const avg = average(allGrades(s));
              const expanded = expandedId === s.id;
              return (
                <div key={s.id} className="rounded-xl overflow-hidden" style={{ background: "#FFFFFF", border: `1px solid ${COLORS.gridLine}` }}>
                  <button
                    onClick={() => setExpandedId(expanded ? null : s.id)}
                    className="w-full flex items-center justify-between px-4 py-2.5"
                  >
                    <div className="flex items-center gap-2 min-w-0">
                      <span style={{ fontFamily: "'Fraunces', serif", color: COLORS.ink }} className="text-sm font-semibold truncate">
                        {s.name}
                      </span>
                      <span style={{ color: COLORS.muted, fontFamily: "'Inter', sans-serif" }} className="text-xs shrink-0">
                        {allGrades(s).length} nota{allGrades(s).length !== 1 ? "s" : ""}
                      </span>
                    </div>
                    <div className="flex items-center gap-2 shrink-0">
                      <div
                        className="w-9 h-9 rounded-full border-2 flex items-center justify-center"
                        style={{ borderColor: COLORS.red, color: COLORS.red, fontFamily: "'JetBrains Mono', monospace", transform: "rotate(-6deg)" }}
                      >
                        <span className="text-xs font-bold">{avg !== null ? avg.toFixed(1) : "–"}</span>
                      </div>
                      <ChevronDownIcon size={16} color={COLORS.muted} style={{ transform: expanded ? "rotate(180deg)" : "none", transition: "transform 0.15s" }} />
                    </div>
                  </button>

                  {expanded && (
                    <div className="px-4 pb-5 pt-3" style={{ borderTop: `1px solid ${COLORS.gridLine}` }}>
                      {CATEGORIES.map((c) => (
                        <CategoryBlock
                          key={c.key}
                          subjectId={s.id}
                          catKey={c.key}
                          catLabel={c.label}
                          grades={s.grades[c.key]}
                          onAdd={onAddGrade}
                          onRemove={onRemoveGrade}
                        />
                      ))}
                      <button
                        onClick={() => onDeleteSubject(s.id)}
                        className="flex items-center gap-1.5 mt-1 text-xs"
                        style={{ color: COLORS.muted, fontFamily: "'Inter', sans-serif" }}
                      >
                        <Trash2Icon size={13} /> Eliminar materia
                      </button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>

      <button
        onClick={() => setShowAdd(true)}
        className="fixed w-14 h-14 rounded-full flex items-center justify-center"
        style={{
          background: COLORS.red,
          color: "#FFFFFF",
          boxShadow: "0 8px 18px rgba(178,58,46,0.4)",
          right: "max(1.5rem, env(safe-area-inset-right, 0px))",
          bottom: "calc(env(safe-area-inset-bottom, 0px) + 1.5rem)",
        }}
      >
        <PlusIcon size={26} />
      </button>

      {showAdd && (
        <div className="fixed inset-0 flex items-end justify-center z-10" style={{ background: "rgba(11,24,48,0.45)" }} onClick={() => setShowAdd(false)}>
          <div
            onClick={(e) => e.stopPropagation()}
            className="w-full max-w-[480px] rounded-t-2xl p-6"
            style={{ background: COLORS.paper, paddingBottom: "calc(env(safe-area-inset-bottom, 0px) + 24px)" }}
          >
            <div className="flex items-center justify-between mb-4">
              <span style={{ fontFamily: "'Fraunces', serif", color: COLORS.ink }} className="text-lg font-semibold">
                Nueva materia
              </span>
              <button onClick={() => setShowAdd(false)}>
                <XIcon size={18} color={COLORS.muted} />
              </button>
            </div>
            <input
              value={newSubject}
              onChange={(e) => setNewSubject(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && confirmAddSubject()}
              placeholder="Nombre de la materia"
              autoFocus
              style={{ fontFamily: "'Inter', sans-serif", background: "#FFFFFF", border: `1px solid ${COLORS.paperEdge}`, color: COLORS.ink }}
              className="w-full rounded-lg px-4 py-3 text-sm mb-4"
            />
            <button
              onClick={confirmAddSubject}
              disabled={!newSubject.trim()}
              style={{ fontFamily: "'Inter', sans-serif", background: COLORS.red, color: "#FFFFFF", opacity: newSubject.trim() ? 1 : 0.6 }}
              className="w-full rounded-full py-3 text-sm font-semibold"
            >
              Agregar materia
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ---------- App ----------
function App() {
  const [loading, setLoading] = useState(true);
  const [userName, setUserName] = useState(null);
  const [biometric, setBiometric] = useState(false);
  const [screen, setScreen] = useState("home");
  const [tasks, setTasks] = useState([]);
  const [subjects, setSubjects] = useState([]);

  useEffect(() => {
    const name = storageGet(STORAGE_KEYS.name);
    const bio = storageGet(STORAGE_KEYS.biometric);
    const tasksRaw = storageGet(STORAGE_KEYS.tasks);
    const subjectsRaw = storageGet(STORAGE_KEYS.subjects);
    if (name) setUserName(name);
    if (bio === "true") setBiometric(true);
    if (tasksRaw) {
      try { setTasks(JSON.parse(tasksRaw)); } catch (e) {}
    }
    if (subjectsRaw) {
      try { setSubjects(JSON.parse(subjectsRaw).map(normalizeSubject)); } catch (e) {}
    }
    setLoading(false);
  }, []);

  const handleLogin = useCallback(async (name, usedBiometric) => {
    setUserName(name);
    setBiometric(usedBiometric);
    storageSet(STORAGE_KEYS.name, name);
    storageSet(STORAGE_KEYS.biometric, usedBiometric ? "true" : "false");
  }, []);

  const handleLogout = useCallback(async () => {
    storageRemove(STORAGE_KEYS.name);
    storageRemove(STORAGE_KEYS.biometric);
    setUserName(null);
    setBiometric(false);
    setScreen("home");
  }, []);

  const updateTasks = useCallback((next) => {
    setTasks(next);
    storageSet(STORAGE_KEYS.tasks, JSON.stringify(next));
  }, []);

  const updateSubjects = useCallback((next) => {
    setSubjects(next);
    storageSet(STORAGE_KEYS.subjects, JSON.stringify(next));
  }, []);

  const addTask = (task) => updateTasks([...tasks, task]);
  const deleteTask = (id) => updateTasks(tasks.filter((t) => t.id !== id));

  const addSubject = (name) => updateSubjects([...subjects, { id: uid(), name, grades: emptyGrades() }]);
  const deleteSubject = (id) => updateSubjects(subjects.filter((s) => s.id !== id));
  const addGrade = (id, catKey, val) =>
    updateSubjects(subjects.map((s) => (s.id === id ? { ...s, grades: { ...s.grades, [catKey]: [...s.grades[catKey], val] } } : s)));
  const removeGrade = (id, catKey, idx) =>
    updateSubjects(subjects.map((s) => (s.id === id ? { ...s, grades: { ...s.grades, [catKey]: s.grades[catKey].filter((_, i) => i !== idx) } } : s)));

  return (
    <div style={{ maxWidth: 480, width: "100%", margin: "0 auto", minHeight: "100dvh", background: COLORS.cover, overflowX: "hidden" }} className="relative">
      {loading ? (
        <div style={{ background: COLORS.cover, minHeight: "100dvh" }} className="flex items-center justify-center">
          <span style={{ fontFamily: "'JetBrains Mono', monospace", color: COLORS.ivoryMuted }} className="text-xs uppercase tracking-widest">
            Cargando…
          </span>
        </div>
      ) : !userName ? (
        <Login onLogin={handleLogin} />
      ) : (
        <React.Fragment>
          {screen === "home" && <Home go={setScreen} taskCount={tasks.length} subjectCount={subjects.length} userName={userName} biometric={biometric} onLogout={handleLogout} />}
          {screen === "calendar" && <CalendarScreen tasks={tasks} onBack={() => setScreen("home")} onDelete={deleteTask} />}
          {screen === "add" && <AddScreen onBack={() => setScreen("home")} onAdd={addTask} subjects={subjects} />}
          {screen === "grades" && (
            <GradesScreen subjects={subjects} onBack={() => setScreen("home")} onAddSubject={addSubject} onAddGrade={addGrade} onRemoveGrade={removeGrade} onDeleteSubject={deleteSubject} />
          )}
        </React.Fragment>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
